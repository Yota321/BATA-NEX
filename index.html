<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BATA NEX</title>

  <!-- Open Graph -->
  <meta property="og:title" content="BATA NEX — Futuristic Retail Concept" />
  <meta property="og:description" content="Future Starts At Your Feet." />
  <meta property="og:image" content="preview.png" />
  <meta property="og:type" content="website" />

  <!-- Auto Redirect (0.5 sec) -->
  <meta http-equiv="refresh" content="0.5; url=https://www.figma.com/proto/3Fy0OLihiAdcROsiLD3Wgj/BATA-NEX">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RQTMZGXEGH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RQTMZGXEGH');
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #EDEDED;
      overflow: hidden;

      /* Improved background */
      background:
        radial-gradient(circle at 30% 30%, rgba(146,102,221,0.15), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(228,94,140,0.12), transparent 40%),
        linear-gradient(#0B0B0F, #0B0B0F);
    }

    /* subtle grid */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      z-index: 1;
    }

    /* BIG SVG LOGO */
    .logo {
      width: 520px;
      max-width: 95%;
      margin-bottom: 20px;
    }

    .tagline {
      color: #9266dd;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 10px;
    }

    .desc {
      font-size: 13px;
      opacity: 0.6;
      margin-top: 8px;
    }

    .info {
      font-size: 12px;
      opacity: 0.5;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid #e45e8c;
      color: #e45e8c;
      text-decoration: none;
      letter-spacing: 1px;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: #e45e8c;
      color: #0B0B0F;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SVG LOGO -->
  <img src="./logo.svg" class="logo" alt="BATA NEX Logo">

  <div class="tagline">Future Starts At Your Feet</div>
  <div class="desc">Futuristic retail concept for Gen Z sneaker culture.</div>

  <div class="info" id="referrerText">Opening...</div>

  <a class="btn" href="https://www.figma.com/proto/3Fy0OLihiAdcROsiLD3Wgj/BATA-NEX">
    ENTER EXPERIENCE
  </a>

</div>

<script>
  // Referrer detection
  const ref = document.referrer;
  const refText = document.getElementById("referrerText");

  if (ref) {
    try {
      const domain = new URL(ref).hostname;
      refText.innerText = "Opened from: " + domain;
    } catch {
      refText.innerText = "Opened from external source";
    }
  } else {
    refText.innerText = "Opened directly";
  }

  // Analytics
  function sendUserData() {
    const device = navigator.userAgent;
    const screenSize = `${window.innerWidth}x${window.innerHeight}`;

    gtag('event', 'user_info', {
      device: device,
      screen_size: screenSize
    });
  }

  sendUserData();
</script>

</body>
</html>
