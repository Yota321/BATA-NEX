<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BATA NEX</title>

  <!-- Open Graph (FIXED) -->
  <meta property="og:title" content="BATA NEX — Futuristic Retail Concept" />
  <meta property="og:description" content="Future Starts At Your Feet." />
  <meta property="og:image" content="https://yota321.github.io/BATA-NEX/preview.png" />
  <meta property="og:url" content="https://yota321.github.io/BATA-NEX/" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RQTMZGXEGH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RQTMZGXEGH');
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Space Grotesk", sans-serif;
      color: #EDEDED;
      overflow: hidden;

      /* CLEAN BACKGROUND */
      background:
        linear-gradient(180deg, #0B0B0F 0%, #111118 100%);
    }

    /* subtle grid */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      z-index: 1;
    }

    /* BIG SVG LOGO */
    .logo {
      width: 460px;
      max-width: 90%;
      margin-bottom: 24px;
    }

    .tagline {
      color: #9266dd;
      font-size: 15px;
      letter-spacing: 1.5px;
    }

    .desc {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 6px;
    }

    .info {
      font-size: 12px;
      opacity: 0.4;
      margin-top: 14px;
    }

    .btn {
      margin-top: 28px;
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid #e45e8c;
      color: #e45e8c;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #e45e8c;
      color: #0B0B0F;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SVG LOGO -->
  <img src="./logo.svg?v=4" class="logo" alt="BATA NEX Logo">

  <div class="tagline">Future Starts At Your Feet</div>
  <div class="desc">Futuristic retail concept for Gen Z sneaker culture.</div>

  <div class="info" id="referrerText">Opening...</div>

  <a class="btn" href="https://www.figma.com/proto/3Fy0OLihiAdcROsiLD3Wgj/BATA-NEX">
    ENTER EXPERIENCE
  </a>

</div>

<script>
  // Referrer detection
  const ref = document.referrer;
  const refText = document.getElementById("referrerText");

  if (ref) {
    try {
      const domain = new URL(ref).hostname;
      refText.innerText = "Opened from: " + domain;
    } catch {
      refText.innerText = "Opened externally";
    }
  } else {
    refText.innerText = "Opened directly";
  }

  // Analytics
  function sendUserData() {
    const device = navigator.userAgent;
    const screenSize = `${window.innerWidth}x${window.innerHeight}`;

    gtag('event', 'user_info', {
      device: device,
      screen_size: screenSize
    });
  }

  sendUserData();

  // Redirect (0.5 sec)
  setTimeout(() => {
    window.location.href = "https://www.figma.com/proto/3Fy0OLihiAdcROsiLD3Wgj/BATA-NEX";
  }, 500);
</script>

</body>
</html>
